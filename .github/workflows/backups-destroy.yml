name: '[Backups] Destroy'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy backups" to confirm'
        required: true

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}

jobs:
  destroy:
    name: Destroy Backup Bucket
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy backups'
    defaults:
      run:
        working-directory: infrastructure/backups

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2.0.1
        with:
          tofu_version: 1.12.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install OCI CLI
        run: pip install oci-cli -q

      - name: OpenTofu Init
        run: |
          OCI_NAMESPACE=$(oci os ns get | jq -r '.data')
          tofu init \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"

      - name: OpenTofu Plan Destroy
        run: tofu plan -destroy -no-color -out=tfplan

      - name: OpenTofu Destroy
        run: tofu apply -auto-approve tfplan

      - name: Verify deletion
        run: |
          echo "=== Remaining resources in state ==="
          tofu state list || echo "State is empty — all resources destroyed"