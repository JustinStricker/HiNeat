name: '[Infra] State Bucket Create'

# Creates the OCI Object Storage bucket for infrastructure remote state.
# This bucket is DISPOSABLE — it stores state for OKE, VCN, IAM, etc.
#
# NOTE: The backups state bucket is managed separately via
#       "[Backup State] Create" workflow.
#
# Run "[Backup State] Create" first to ensure both buckets exist.

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Cluster name (matches backend.tf bucket name)'
        required: false
        default: 'hineat'

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create state bucket
        id: create_bucket
        run: |
          CLUSTER_NAME="${{ github.event.inputs.cluster_name }}"
          BUCKET_NAME="hineat-tfstate-${CLUSTER_NAME}"
          NAMESPACE=$(oci os ns get | jq -r '.data')

          if oci os bucket get --namespace "${NAMESPACE}" --bucket-name "${BUCKET_NAME}" &>/dev/null; then
            echo "Bucket '${BUCKET_NAME}' already exists."
          else
            echo "Creating bucket '${BUCKET_NAME}'..."
            oci os bucket create \
              --compartment-id "${OCI_COMPARTMENT_OCID}" \
              --name "${BUCKET_NAME}" \
              --namespace "${NAMESPACE}" \
              --public-access-type "NoPublicAccess" \
              --storage-tier "Standard" \
              --versioning "Enabled"
          fi

          echo "namespace=${NAMESPACE}" >> $GITHUB_OUTPUT
          echo "bucket=${BUCKET_NAME}" >> $GITHUB_OUTPUT

      - name: Print instructions
        run: |
          echo "========================================"
          echo "  Bucket created: ${{ steps.create_bucket.outputs.bucket }}"
          echo "  Namespace:      ${{ steps.create_bucket.outputs.namespace }}"
          echo ""
          echo "  This bucket stores INFRASTRUCTURE state ONLY."
          echo "  It is disposable — backups state is in a separate bucket."
          echo ""
          echo "  Update infrastructure/backend.tf endpoint:"
          echo "  https://${{ steps.create_bucket.outputs.namespace }}.compat.objectstorage.${{ env.OCI_REGION }}.oraclecloud.com"
          echo ""
          echo "  Then run: tofu init -migrate-state"
          echo ""
          echo "  Also run '[Backup State] Create' to create the backups state bucket."
          echo "========================================"
