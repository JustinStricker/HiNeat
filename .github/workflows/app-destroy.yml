name: '[App] Destroy'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy app" to confirm'
        required: true

env:
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy app'

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install OCI CLI
      run: pip install oci-cli -q

    - name: Get Cluster OCID
      id: cluster
      run: |
        OCID=$(oci ce cluster list \
          --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
          --name "hineat" \
          --lifecycle-state ACTIVE \
          | jq -r '.data[0].id')
        echo "cluster_id=$OCID" >> $GITHUB_OUTPUT

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        oci ce cluster create-kubeconfig \
          --cluster-id ${{ steps.cluster.outputs.cluster_id }} \
          --file $HOME/.kube/config \
          --region ${{ secrets.OCI_REGION }} \
          --token-version 2.0.0

    - name: Delete Kubernetes resources
      run: |
        kubectl delete deployment hineat-server --ignore-not-found
        kubectl delete svc hineat-server --ignore-not-found
        kubectl delete pvc hineat-server-data --ignore-not-found

    - name: Verify deletion
      run: |
        echo "=== Remaining resources ==="
        for resource in deployment/hineat-server svc/hineat-server pvc/hineat-server-data; do
          if kubectl get "$resource" &>/dev/null 2>&1; then
            echo "  $resource — still present"
          else
            echo "  $resource — gone"
          fi
        done

    - name: Delete OCIR images
      run: |
        echo "Deleting all images in OCIR repository 'hineat-server'..."
        # List all images and delete each one
        IMAGES=$(oci artifacts container image list \
          --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
          --repository-name "hineat-server" \
          --lifecycle-state AVAILABLE \
          | jq -r '.data[].id' 2>/dev/null || true)
        if [ -n "$IMAGES" ]; then
          echo "$IMAGES" | while IFS= read -r img_id; do
            [ -z "$img_id" ] && continue
            echo "  Deleting image: $img_id"
            oci artifacts container image delete \
              --image-id "$img_id" \
              --force 2>/dev/null || true
          done
          echo "All images deleted."
        else
          echo "No images found — repository already empty or doesn't exist."
        fi
        # Delete the repository itself
        echo "Deleting OCIR repository 'hineat-server'..."
        oci artifacts container repository delete \
          --repository-id "$(oci artifacts container repository list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --display-name "hineat-server" \
            | jq -r '.data[0].id // empty')" \
          --force 2>/dev/null || echo "Repository not found or already deleted."

    - name: Remove Cloudflare DNS record
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=hineat.com" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id')
        RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=api.hineat.com" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')
        if [ -n "$RECORD_ID" ]; then
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo "DNS record deleted"
        else
          echo "No DNS record found — nothing to delete"
        fi
